services:
  vellichor-web:
    build: .
    image: vellichor-web:latest
    container_name: vellichor-web
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "7777:7777"
    environment:
      # GPU
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      # Auth (set in .env)
      VELLICHOR_PASSWORD: "${VELLICHOR_PASSWORD}"
      SECRET_KEY: "${SECRET_KEY}"
      # Own exported audiobooks as the Audiobookshelf user so ABS can read them
      ABS_UID: "911"
      ABS_GID: "911"
      # Optional: push a notification when a conversion finishes
      # (e.g. ntfy at http://<server-ip>:8087/<topic>, gotify at :8070)
      NOTIFY_URL: "${NOTIFY_URL:-}"
      # AI "Smart cast" — local Ollama model for speaker attribution
      OLLAMA_URL: "http://ollama:11434"
      SMARTCAST_MODEL: "${SMARTCAST_MODEL:-llama3.2:3b}"
    volumes:
      - ./data:/data
      - /mnt/user/eMedia/eMedia/Audiobooks:/library
    depends_on:
      - ollama

  ollama:
    # Pinned: newer Ollama dropped the Pascal (GTX 1080, cc 6.1) CUDA build from
    # its cuda_v13 runner. 0.30.11 still bundles cuda_v12, which supports the
    # 1080 — so Smart cast offloads to the GPU instead of falling back to CPU.
    # Digest pinned so a re-pushed tag can't silently regress this. Before
    # bumping, confirm the new image still lists arch 610 in its CUDA ARCHS.
    image: ollama/ollama:0.30.11@sha256:c484b703176aa19dfc0a54cbfb60ab8094b38faa04283fb77eba1d33319e5eca
    container_name: vellichor-ollama
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      # Unload the model from VRAM 2 min after use, freeing it for Kokoro
      OLLAMA_KEEP_ALIVE: "2m"
    volumes:
      - ./data/ollama:/root/.ollama
